```html
{% extends "base.html" %}

{% block title %}Guías de Salida{% endblock %}

{% block content %}

<div class="py-4">

    <!-- ENCABEZADO -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-1">
                📋 Nueva Guía de Salida
            </h2>

            <p class="text-muted mb-0">
                Registro de materiales para personal técnico
            </p>

        </div>

    </div>

    <form action="/guardar_guia" method="POST" onsubmit="return prepararEnvio()">

        <!-- DATOS GENERALES -->
        <div class="card shadow-sm">

            <div class="card-header bg-primary text-white">
                Datos Generales
            </div>

            <div class="card-body">

                <div class="row g-3">

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            Solicitante
                        </label>

                        <select class="form-select" name="personal" required>

                            <option value="" selected disabled>
                                Seleccione personal
                            </option>

                            {% for p in personal %}

                            <option value="{{ p.nombre }}">
                                {{ p.nombre }} - {{ p.cargo }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            Destino
                        </label>
                        <div class="col-md-6">

                            <label class="form-label fw-semibold">

                                Proyecto

                            </label>

                            <input type="text" class="form-control" name="proyecto" placeholder="Ej. BBVA San Isidro">

                        </div>

                        <select class="form-select" name="destino" required>

                            <option value="" selected disabled>
                                Seleccione edificio
                            </option>

                            {% for e in edificios %}

                            <option value="{{ e.nombre }}">
                                {{ e.nombre }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-12">

                        <label class="form-label fw-semibold">
                            Observaciones
                        </label>

                        <textarea class="form-control" rows="3" name="observaciones"></textarea>

                    </div>

                </div>

            </div>

        </div>

        <!-- PRODUCTOS -->
        <div class="card shadow-sm mt-4">

            <div class="card-header bg-success text-white">

                Productos de la Guía

            </div>

            <div class="card-body">

                <table class="table table-bordered align-middle">

                    <thead>

                        <tr>

                            <th>Producto</th>
                            <th width="120">Cantidad</th>
                            <th width="120">Acción</th>

                        </tr>

                    </thead>

                    <tbody id="detalleProductos">

                        <tr id="filaVacia">

                            <td colspan="3" class="text-center text-muted">

                                No hay productos agregados

                            </td>

                        </tr>

                    </tbody>

                </table>

                <div class="d-flex justify-content-between">

                    <button type="button" class="btn btn-success" data-bs-toggle="modal"
                        data-bs-target="#modalProducto">

                        + Agregar Producto

                    </button>

                    <button type="submit" class="btn btn-primary">

                        💾 Guardar Guía

                    </button>

                </div>

            </div>

        </div>

        <input type="hidden" id="productosJson" name="productos">

    </form>

</div>

<!-- MODAL PRODUCTO -->

<div class="modal fade" id="modalProducto" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Agregar Producto

                </h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">

                        Producto

                    </label>

                    <select id="productoSelect" class="form-select">

                        {% for equipo in equipos %}

                        <option value="{{ equipo.id }}">

                            {{ equipo.marca }}
                            -
                            {{ equipo.descripcion }}
                            (Stock: {{ equipo.cantidad }})

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div>

                    <label class="form-label">

                        Cantidad

                    </label>

                    <input type="number" id="cantidadProducto" class="form-control" min="1" value="1">

                </div>

            </div>

            <div class="modal-footer">

                <button type="button" class="btn btn-success" onclick="agregarProducto()">

                    Agregar

                </button>

            </div>

        </div>

    </div>

</div>

<script>

    let productos = [];

    function agregarProducto() {

        const select = document.getElementById("productoSelect");

        const id = select.value;

        const descripcion =
            select.options[
                select.selectedIndex
            ].text;

        const cantidad =
            parseInt(
                document.getElementById(
                    "cantidadProducto"
                ).value
            );

        if (cantidad <= 0) {

            alert("Cantidad inválida");
            return;

        }

        const existente =
            productos.find(
                p => p.id === id
            );

        if (existente) {

            existente.cantidad += cantidad;

        } else {

            productos.push({

                id: id,
                descripcion: descripcion,
                cantidad: cantidad

            });

        }

        renderizarTabla();

        document.getElementById(
            "cantidadProducto"
        ).value = 1;

        bootstrap.Modal
            .getInstance(
                document.getElementById(
                    "modalProducto"
                )
            )
            .hide();
    }

    function renderizarTabla() {

        const tabla =
            document.getElementById(
                "detalleProductos"
            );

        tabla.innerHTML = "";

        if (productos.length === 0) {

            tabla.innerHTML = `
            <tr>
                <td colspan="3"
                    class="text-center text-muted">
                    No hay productos agregados
                </td>
            </tr>
        `;

            return;
        }

        productos.forEach((item, index) => {

            tabla.innerHTML += `
        <tr>

            <td>${item.descripcion}</td>

            <td>${item.cantidad}</td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    onclick="eliminarProducto(${index})">

                    Eliminar

                </button>

            </td>

        </tr>
        `;

        });

    }

    function eliminarProducto(index) {

        productos.splice(index, 1);

        renderizarTabla();

    }

    function prepararEnvio() {

        if (productos.length === 0) {

            alert(
                "Debe agregar al menos un producto"
            );

            return false;
        }

        document.getElementById(
            "productosJson"
        ).value =
            JSON.stringify(productos);

        return true;
    }

</script>

{% endblock %}
```
