```html
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Sistema de Inventario{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar: #1e293b;
            --sidebar-hover: #334155;
            --primary: #0d6efd;
            --bg: #f1f5f9;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--sidebar);
            color: white;
            z-index: 1000;
            transition: .3s;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .sidebar-header h4 {
            margin: 0;
            font-size: 1.1rem;
        }

        .sidebar.collapsed .logo-text {
            display: none;
        }

        .menu {
            padding: 15px 10px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: .2s;
        }

        .menu a:hover {
            background: var(--sidebar-hover);
        }

        .menu a.active {
            background: var(--primary);
        }

        .sidebar.collapsed .menu-text {
            display: none;
        }

        /* BOTON */

        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
        }

        /* CONTENIDO */

        .main-content {
            margin-left: 260px;
            transition: .3s;
            padding: 25px;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 80px;
        }

        /* TARJETAS */

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, .08);
        }

        .card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, .12);
        }

        /* FORMULARIOS */

        .form-control,
        .form-select {
            border-radius: 10px;
        }

        /* TABLAS */

        .table thead {
            background: #f8fafc;
        }

        .table-hover tbody tr:hover {
            background: #f1f5f9;
        }

        /* FOOTER */

        .footer {
            text-align: center;
            padding: 15px;
            color: #6c757d;
        }

        @media(max-width:768px) {

            .sidebar {
                width: 80px;
            }

            .sidebar .menu-text,
            .sidebar .logo-text {
                display: none;
            }

            .main-content {
                margin-left: 80px;
            }
        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">

            <button class="toggle-btn" onclick="toggleSidebar()">
                ☰
            </button>

            <h4 class="logo-text">
                🎥 Inventario CCTV
            </h4>

        </div>

        <div class="menu">

            <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                <span>🏠</span>
                <span class="menu-text">Dashboard</span>
            </a>

            <a href="/ingresos" class="{% if request.path == '/ingresos' %}active{% endif %}">
                <span>📥</span>
                <span class="menu-text">Ingresos</span>
            </a>

            <a href="/salidas" class="{% if request.path == '/salidas' %}active{% endif %}">
                <span>📤</span>
                <span class="menu-text">Salidas</span>
            </a>




            <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                href="#menuGuias" role="button">

                <span>📋 Guías</span>
                <span>▼</span>

            </a>

            <div class="collapse" id="menuGuias">

                <ul class="nav flex-column ms-3">

                    <li class="nav-item">

                        <a class="nav-link" href="/guias">

                            ➕ Nueva Guía

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="/listar_guias">

                            📄 Listado de Guías

                        </a>

                    </li>

                </ul>

            </div>




            <a href="/personal" class="{% if request.path == '/personal' %}active{% endif %}">
                <span>👷</span>
                <span class="menu-text">Personal</span>
            </a>

            <a href="/configuracion" class="{% if request.path == '/configuracion' %}active{% endif %}">
                <span>⚙️</span>
                <span class="menu-text">Configuración</span>
            </a>

        </div>

    </div>

    <!-- CONTENIDO -->

    <div class="main-content" id="mainContent">

        {% block content %}
        {% endblock %}

        <div class="footer">
            📦 Sistema de Inventario CCTV & Redes | v1.0
        </div>

    </div>

    <script>

        function toggleSidebar() {

            document
                .getElementById("sidebar")
                .classList
                .toggle("collapsed");

            document
                .getElementById("mainContent")
                .classList
                .toggle("expanded");
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
```
